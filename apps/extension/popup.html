<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=360, initial-scale=1" />
    <title>Time Tracker</title>
    <script>
      // Apply the cached theme before React mounts to avoid FOUC.
      (function () {
        try {
          var t = localStorage.getItem('tt:theme') || 'system';
          var dark =
            t === 'dark' ||
            (t === 'system' &&
              window.matchMedia &&
              matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
    <div id="root"></div>
    <script type="module" src="/src/popup-entry.tsx"></script>
  </body>
</html>
