# Coolify deployment compose file (NOT used for local dev — see
# docker-compose.dev.yml). Two services: web (Next.js) on 3000 and ws
# (WebSocket bridge) on 3001. Postgres + Redis come from separate Coolify
# Databases in the same project; their connection strings are injected via
# the DATABASE_URL / REDIS_URL env vars set in the Coolify UI.
#
# Traefik routing is declared explicitly per service via labels. Coolify's
# auto-routing only handles a single port per Application, but we have two
# services on different ports and different subdomains.
services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      APP_URL: ${APP_URL}
      WS_PUBLIC_URL: ${WS_PUBLIC_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-}
    expose:
      - '3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- -T 5 http://localhost:3000/login >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.tt-web-http.rule=Host(`tracker.agent42.cz`)
      - traefik.http.routers.tt-web-http.entrypoints=http
      - traefik.http.routers.tt-web-http.middlewares=tt-redirect
      - traefik.http.routers.tt-web.rule=Host(`tracker.agent42.cz`)
      - traefik.http.routers.tt-web.entrypoints=https
      - traefik.http.routers.tt-web.tls=true
      - traefik.http.routers.tt-web.tls.certresolver=letsencrypt
      - traefik.http.routers.tt-web.service=tt-web-svc
      - traefik.http.services.tt-web-svc.loadbalancer.server.port=3000
      - traefik.http.middlewares.tt-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.tt-redirect.redirectscheme.permanent=true

  ws:
    build:
      context: .
      dockerfile: docker/ws.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WS_PORT: '3001'
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    expose:
      - '3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- -T 5 http://localhost:3001/ >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.tt-ws-http.rule=Host(`tracker-ws.agent42.cz`)
      - traefik.http.routers.tt-ws-http.entrypoints=http
      - traefik.http.routers.tt-ws-http.middlewares=tt-redirect
      - traefik.http.routers.tt-ws.rule=Host(`tracker-ws.agent42.cz`)
      - traefik.http.routers.tt-ws.entrypoints=https
      - traefik.http.routers.tt-ws.tls=true
      - traefik.http.routers.tt-ws.tls.certresolver=letsencrypt
      - traefik.http.routers.tt-ws.service=tt-ws-svc
      - traefik.http.services.tt-ws-svc.loadbalancer.server.port=3001

networks:
  # Joining the shared coolify network lets web/ws resolve sibling
  # Coolify-managed databases (time-tracker-db, time-tracker-redis) by
  # their container name from DATABASE_URL / REDIS_URL.
  coolify:
    external: true
