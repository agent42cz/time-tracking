name: CI / CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: timetracker_test
          POSTGRES_USER: timetracker
          POSTGRES_PASSWORD: timetracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U timetracker -d timetracker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://timetracker:timetracker@localhost:5432/timetracker_test?schema=public
      REDIS_URL: redis://localhost:6379
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_FROM: ci@time-tracker.local
      AUTH_SECRET: ci-test-secret-do-not-use-in-production
      AUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      WS_PORT: 3001
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm prisma:generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:trace
      - run: pnpm build

  deploy:
    name: Deploy to Coolify
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-coolify-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://trackerqwertzuiop.agent42.cz

    env:
      COOLIFY_URL: ${{ vars.COOLIFY_URL || 'https://coolify.agent42.cz' }}
      COOLIFY_APP_UUID: ${{ vars.COOLIFY_APP_UUID || 'cg8145vxiumj2l9lzugtn76y' }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

    steps:
      - name: Check Coolify secret
        id: check
        run: |
          if [ -z "${COOLIFY_API_TOKEN}" ]; then
            echo "::warning::COOLIFY_API_TOKEN repo secret not set — skipping CD step."
            echo "To enable gated deploys, create a token in Coolify → Keys & Tokens and add it as the COOLIFY_API_TOKEN repo secret."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Trigger Coolify deploy
        if: steps.check.outputs.skip == 'false'
        id: trigger
        run: |
          set -euo pipefail
          response=$(curl --silent --show-error --fail-with-body \
            --request GET \
            --header "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            --header "Accept: application/json" \
            "${COOLIFY_URL}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false")
          echo "Coolify response: ${response}"
          deployment_uuid=$(printf '%s' "${response}" | jq -r '.deployments[0].deployment_uuid // .deployment_uuid // empty')
          if [ -z "${deployment_uuid}" ]; then
            echo "::error::Could not parse deployment_uuid from Coolify response."
            exit 1
          fi
          echo "deployment_uuid=${deployment_uuid}" >> "${GITHUB_OUTPUT}"
          echo "Started Coolify deployment ${deployment_uuid}"

      - name: Wait for deployment to finish
        if: steps.check.outputs.skip == 'false'
        env:
          DEPLOYMENT_UUID: ${{ steps.trigger.outputs.deployment_uuid }}
        run: |
          set -euo pipefail
          attempts=0
          max_attempts=90  # 90 * 10s = 15 min
          while : ; do
            status_json=$(curl --silent --show-error --fail-with-body \
              --header "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              --header "Accept: application/json" \
              "${COOLIFY_URL}/api/v1/deployments/${DEPLOYMENT_UUID}")
            status=$(printf '%s' "${status_json}" | jq -r '.status // .data.status // "unknown"')
            echo "Deployment ${DEPLOYMENT_UUID} status: ${status}"
            case "${status}" in
              finished|success|successful)
                echo "Deployment finished successfully."
                exit 0
                ;;
              failed|cancelled|cancelled-by-user|error)
                echo "::error::Coolify deployment ended with status '${status}'."
                printf '%s\n' "${status_json}" | jq . || true
                exit 1
                ;;
            esac
            attempts=$((attempts + 1))
            if [ "${attempts}" -ge "${max_attempts}" ]; then
              echo "::error::Timed out waiting for Coolify deployment to finish."
              exit 1
            fi
            sleep 10
          done
